<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shinny the Fortune Cat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <span class="page-cat-name">Pusiel</span>
    </header>
    <section class="card">
      <div class="cat-container" id="cat" aria-label="Pusiel the orange cat">
        <span class="cat-emoji">🐱</span>
      </div>
      <h1>Pusiel the Fortune Cat</h1>
      <p class="subtitle">Tap Pusiel to receive your fortune.</p>
      <div id="fortuneMessage" class="fortune-message">
        <span class="fortune-text">Pusiel is ready to tell your fortune.</span>
      </div>
    </section>
  </main>
  <div class="flying-cats" aria-hidden="true">
    <span class="flying-cat"></span>
    <span class="flying-cat"></span>
    <span class="flying-cat"></span>
    <span class="flying-cat"></span>
  </div>
  <script src="script.js"></script>
</body>
</html>
